<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120" role="img" aria-label="caveword logo">
  <defs>
    <linearGradient id="stone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6a523f"/>
      <stop offset="1" stop-color="#332419"/>
    </linearGradient>
    <linearGradient id="club" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#5d3d1d"/>
      <stop offset="1" stop-color="#a37041"/>
    </linearGradient>
  </defs>

  <!-- chunky stone tablet -->
  <path d="M18 16 Q14 8 28 6 L334 8 Q348 10 346 24 L344 100 Q344 110 328 110 L30 108 Q14 108 16 96 Z"
        fill="url(#stone)" stroke="#160c06" stroke-width="3"/>

  <!-- chiselled cracks -->
  <path d="M44 24 L52 30 L46 40" fill="none" stroke="#160c06" stroke-width="1.5" opacity="0.45"/>
  <path d="M312 84 L320 92 L312 98" fill="none" stroke="#160c06" stroke-width="1.5" opacity="0.45"/>
  <path d="M180 14 L186 18 L182 24" fill="none" stroke="#160c06" stroke-width="1.2" opacity="0.35"/>

  <!-- text -->
  <text x="180" y="76" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="52" fill="#f3e3bd" letter-spacing="3"
        style="font-weight:900">caveword</text>

  <!-- club icon, lower-left of tablet -->
  <g transform="translate(54 90) rotate(-28)">
    <rect x="0" y="-4" width="32" height="8" rx="4" fill="url(#club)" stroke="#160c06" stroke-width="1.2"/>
    <ellipse cx="34" cy="0" rx="11" ry="9" fill="#a37041" stroke="#160c06" stroke-width="1.2"/>
    <circle cx="32" cy="-2" r="1.4" fill="#5d3d1d"/>
    <circle cx="36" cy="2" r="1.2" fill="#5d3d1d"/>
  </g>
</svg>
